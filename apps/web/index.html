<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161616" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#161616" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (() => {
        const DARK_BG = "#161616";
        // Map themeId -> [appearance, chromeColor]
        // Keep in sync with apps/web/src/themes/index.ts
        const T = {
          "default-light": ["light", "#ffffff"],
          "catppuccin-latte": ["light", "#eff1f5"],
          "rose-pine-dawn": ["light", "#faf4ed"],
          "default-dark": ["dark", DARK_BG],
          nord: ["dark", "#2e3440"],
          monokai: ["dark", "#272822"],
          "tokyo-night": ["dark", "#1a1b26"],
        };
        const m = document.querySelector('meta[name="theme-color"]');
        try {
          let s = window.localStorage.getItem("t3code:theme");
          // Migrate legacy values
          if (s === "light") {
            s = "default-light";
            window.localStorage.setItem("t3code:theme", s);
          } else if (s === "dark") {
            s = "default-dark";
            window.localStorage.setItem("t3code:theme", s);
          }
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          let resolved;
          if (s === "system" || !s || !T[s]) {
            resolved = prefersDark ? "default-dark" : "default-light";
          } else {
            resolved = s;
            document.documentElement.dataset.theme = resolved;
          }
          const entry = T[resolved] || (prefersDark ? ["dark", DARK_BG] : ["light", "#ffffff"]);
          document.documentElement.classList.toggle("dark", entry[0] === "dark");
          document.documentElement.style.backgroundColor = entry[1];
          m?.setAttribute("content", entry[1]);
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = DARK_BG;
          m?.setAttribute("content", DARK_BG);
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #ffffff;
        color: #262626;
        font-family:
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      html.dark body {
        background: #161616;
        color: #f5f5f5;
      }

      #boot-shell {
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        background: inherit;
      }

      #boot-shell-card {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
      }

      #boot-shell-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap"
      rel="stylesheet"
    />
    <title>T3 Code (Alpha)</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-shell">
        <div id="boot-shell-card" aria-label="T3 Code splash screen">
          <img id="boot-shell-logo" src="/apple-touch-icon.png" alt="T3 Code" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
